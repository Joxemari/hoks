<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #fff; --surface: #f7f7f7; --ink: #111;
  --ink2: #888; --ink3: #bbb; --border: #e8e8e8; --border-dark: #d0d0d0;
  --f: 'Courier New', Courier, monospace; --r: 2px;
}
body { font-family: var(--f); background: var(--bg); color: var(--ink); min-height: 100vh; padding-bottom: 6rem; }

/* CONTROLS — sits below nav */
.controls {
  max-width: 1100px; margin: 52px auto 0;
  padding: 1.2rem 2rem;
  display: flex; gap: 10px; align-items: center;
  border-bottom: 1px solid var(--border);
  justify-content: space-between;
}
.controls-left { display: flex; gap: 10px; align-items: center; flex: 1; }
.controls-right { display: flex; gap: 10px; align-items: center; flex-shrink: 0; }
.search-wrap { flex: 1; min-width: 160px; }
.search-wrap input {
  width: 100%; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--r);
  padding: 8px 12px; font-family: var(--f);
  font-size: 11px; color: var(--ink); outline: none;
  letter-spacing: 0.04em; transition: border-color 0.15s;
}
.search-wrap input:focus { border-color: var(--border-dark); }
.search-wrap input::placeholder { color: var(--ink3); text-transform: uppercase; letter-spacing: 0.08em; }
.sort-select {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 8px 10px;
  font-family: var(--f); font-size: 10px;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--ink); cursor: pointer; outline: none;
}
.count {
  font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--ink3); white-space: nowrap;
}
.btn-new {
  font-family: var(--f); font-size: 10px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  background: var(--ink); color: #fff; border: none;
  border-radius: var(--r); padding: 8px 16px;
  cursor: pointer; transition: opacity 0.15s; white-space: nowrap; flex-shrink: 0;
}
.btn-new:hover { opacity: 0.75; }

/* GRID */
.grid {
  max-width: 1100px; margin: 2rem auto 0;
  padding: 0 2rem;
  display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 14px;
}

/* CARD */
.palette-card {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 3px; overflow: hidden;
  transition: border-color 0.15s; display: flex; flex-direction: column;
}
.palette-card:hover { border-color: var(--border-dark); }
.swatches { display: flex; height: 72px; overflow: hidden; }
.swatch {
  flex: 1; cursor: pointer; position: relative;
  transition: flex 0.25s cubic-bezier(0.4,0,0.2,1);
}
.swatch:hover { flex: 2.5; }
.swatch-tip {
  position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.65); color: #fff;
  font-family: var(--f); font-size: 8px; font-weight: 700;
  padding: 2px 6px; border-radius: 2px; white-space: nowrap;
  pointer-events: none; opacity: 0; transition: opacity 0.12s;
  letter-spacing: 0.04em;
}
.swatch:hover .swatch-tip { opacity: 1; }
.card-body { padding: 10px 12px 2px; flex: 1; }
.card-name {
  font-size: 11px; font-weight: 700; letter-spacing: 0.06em;
  text-transform: uppercase; color: var(--ink); margin-bottom: 4px;
}
.card-tags { display: flex; gap: 3px; flex-wrap: wrap; }
.tag {
  font-size: 8px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--ink3);
  border: 1px solid var(--border); border-radius: 2px; padding: 1px 5px;
}
.card-footer {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 12px 10px; gap: 6px; margin-top: auto;
}
.hex-list { display: flex; gap: 4px; flex-wrap: wrap; flex: 1; }
.hex-chip {
  font-size: 8px; font-weight: 600; letter-spacing: 0.03em;
  color: var(--ink3); cursor: pointer; font-family: var(--f);
  transition: color 0.12s;
}
.hex-chip:hover { color: var(--ink); }
.card-actions { display: flex; gap: 2px; flex-shrink: 0; }
.btn-icon {
  background: none; border: none; cursor: pointer; color: var(--ink3);
  font-size: 11px; width: 24px; height: 24px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 2px; transition: color 0.12s, background 0.12s;
}
.btn-icon:hover { color: var(--ink); background: var(--surface); }

/* Toggle */
.toggle { position:relative;width:30px;height:16px;flex-shrink:0;display:inline-block; }
.toggle input { opacity:0;width:0;height:0;position:absolute; }
.toggle-track { position:absolute;inset:0;background:var(--border-dark);border-radius:8px;cursor:pointer;transition:background 0.2s; }
.toggle input:checked + .toggle-track { background:#111; }
.toggle-thumb { position:absolute;top:3px;left:3px;width:10px;height:10px;background:#fff;border-radius:50%;transition:transform 0.2s;pointer-events:none;z-index:1; }
.toggle input:checked + .toggle-track + .toggle-thumb { transform:translateX(14px); }
.palette-card.inactive { opacity: 0.4; }

/* Empty */
.empty-state { grid-column:1/-1;padding:5rem 2rem;text-align:center; }
.empty-big { font-size:1.2rem;font-weight:300;color:var(--ink3);letter-spacing:-0.02em;margin-bottom:6px; }
.empty-sub { font-size:11px;color:var(--ink3);letter-spacing:0.06em;text-transform:uppercase; }

/* Modal */
.overlay {
  position:fixed;inset:0;background:rgba(0,0,0,0.3);
  display:flex;align-items:center;justify-content:center;
  z-index:200;padding:1rem;opacity:0;pointer-events:none;transition:opacity 0.18s;
}
.overlay.open { opacity:1;pointer-events:all; }
.modal {
  background:var(--bg);border:1px solid var(--border-dark);border-radius:3px;
  padding:1.8rem;width:100%;max-width:420px;max-height:90vh;overflow-y:auto;
  transform:translateY(8px);opacity:0;
  transition:transform 0.2s cubic-bezier(0.4,0,0.2,1),opacity 0.18s;
}
.overlay.open .modal { transform:translateY(0);opacity:1; }
.modal-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:1.4rem; }
.modal h2 { font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink); }
.modal-close { background:none;border:none;cursor:pointer;color:var(--ink3);font-size:16px;line-height:1;padding:2px 6px;transition:color 0.12s; }
.modal-close:hover { color:var(--ink); }
.field { margin-bottom:1rem; }
.field label { display:block;font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink3);margin-bottom:5px; }
.field input,.field textarea {
  width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:8px 10px;font-family:var(--f);font-size:11px;color:var(--ink);
  outline:none;transition:border-color 0.15s;
}
.field input:focus,.field textarea:focus { border-color:var(--border-dark);background:#fff; }
.color-chips { display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;min-height:4px; }
.chip {
  display:flex;align-items:center;gap:4px;background:var(--surface);
  border:1px solid var(--border);border-radius:2px;
  padding:3px 8px 3px 6px;font-size:10px;font-family:var(--f);color:var(--ink);
}
.chip-dot { width:10px;height:10px;border-radius:50%;border:1px solid rgba(0,0,0,0.12);flex-shrink:0; }
.chip-rm { border:none;background:none;cursor:pointer;color:var(--ink3);font-size:12px;line-height:1;padding:0;margin-left:2px;transition:color 0.12s; }
.chip-rm:hover { color:var(--ink); }
.add-row { display:flex;gap:6px;align-items:center; }
.add-row input[type="color"] { width:34px;height:34px;border:1px solid var(--border);border-radius:var(--r);padding:2px;background:var(--surface);cursor:pointer;flex-shrink:0; }
.add-row input[type="text"] { flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:8px 10px;font-family:var(--f);font-size:11px;color:var(--ink);outline:none; }
.add-row input[type="text"]:focus { border-color:var(--border-dark); }
.btn-add-color { font-family:var(--f);font-weight:700;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:8px 12px;cursor:pointer;color:var(--ink);white-space:nowrap;transition:border-color 0.15s; }
.btn-add-color:hover { border-color:var(--border-dark); }
.preview-strip { height:12px;border-radius:2px;border:1px solid var(--border);overflow:hidden;display:flex;margin-top:8px; }
.preview-strip span { flex:1; }
.modal-actions { display:flex;gap:8px;justify-content:flex-end;margin-top:1.4rem;padding-top:1rem;border-top:1px solid var(--border); }
.btn-cancel { font-family:var(--f);font-weight:700;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;background:none;border:1px solid var(--border);border-radius:var(--r);padding:8px 16px;color:var(--ink2);cursor:pointer;transition:border-color 0.15s; }
.btn-cancel:hover { border-color:var(--border-dark); }
.btn-save { font-family:var(--f);font-weight:700;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;background:var(--ink);color:#fff;border:none;border-radius:var(--r);padding:8px 20px;cursor:pointer;transition:opacity 0.15s; }
.btn-save:hover { opacity:0.75; }

/* Toast */
.toast { position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(6px);background:var(--ink);color:#fff;font-family:var(--f);font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:9px 18px;border-radius:2px;opacity:0;pointer-events:none;transition:all 0.2s cubic-bezier(0.4,0,0.2,1);z-index:300;white-space:nowrap; }
.toast.show { opacity:1;transform:translateX(-50%) translateY(0); }
</style>
</head>

async function loadPalettes() {
  try {
    const r = await fetch(RAW + 'palettes.json?t=' + Date.now());
    pals = r.ok ? await r.json() : [...DEFAULTS];
  } catch(e) { pals = [...DEFAULTS]; }
  render();
}

function persist() {}

function render() {
  const q = $('search').value.toLowerCase().trim();
  const srt = $('sort').value;
  let list = pals.filter(p => !q || p.name.toLowerCase().includes(q) || (p.tags||[]).some(t=>t.toLowerCase().includes(q)));
  if(srt==='newest') list.sort((a,b)=>b.created-a.created);
  if(srt==='oldest') list.sort((a,b)=>a.created-b.created);
  if(srt==='name') list.sort((a,b)=>a.name.localeCompare(b.name));
  if(srt==='colors') list.sort((a,b)=>b.colors.length-a.colors.length);
  $('count').textContent = list.length + (list.length===1?' palette':' palettes');
  const grid = $('grid');
  if(!list.length){
    grid.innerHTML=`<div class="empty-state"><p class="empty-big">No results</p><p class="empty-sub">Try a different term or add a palette</p></div>`;
    return;
  }
  grid.innerHTML = list.map(p => {
    const isActive = p.active !== false;
    if (!isActive) return '';
    return `
    <div class="palette-card">
      <div class="swatches">
        ${p.colors.map(c=>`<div class="swatch" style="background:${c}" data-hex="${c}"><span class="swatch-tip">${c}</span></div>`).join('')}
      </div>
      <div class="card-body">
        <div class="card-name">${esc(p.name)}</div>
        ${p.tags?.length?`<div class="card-tags">${p.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>`:''}
      </div>
      <div class="card-footer">
        <div class="hex-list">${p.colors.map(c=>`<span class="hex-chip" data-hex="${c}">${c}</span>`).join('')}</div>
        <div class="card-actions">
          <button class="btn-icon" title="Copy all" data-copyall="${p.id}">⎘</button>
        </div>
      </div>
    </div>`}).join('');
}

const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

async function copyText(t) {
  try {
    if(navigator.clipboard?.writeText) await navigator.clipboard.writeText(t);
    else { const ta=document.createElement('textarea');ta.value=t;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.focus();ta.select();document.execCommand('copy');document.body.removeChild(ta); }
    toast('Copied: '+t);
  } catch(e){ toast('Copy failed'); }
}
function copySwatch(hex,el) {
  copyText(hex);
  const tip=el.querySelector('.swatch-tip');
  if(tip){tip.textContent='✓';setTimeout(()=>{tip.textContent=hex;},1200);}
}
function deletePal(id) {
  if(!confirm('Delete this palette?'))return;
  pals=pals.filter(p=>p.id!==id); persist(); render(); toast('Palette deleted');
}
function editPal(id) {
  const p=pals.find(x=>x.id===id); if(!p)return;
  editId=id; $('modalTitle').textContent='Edit Palette';
  $('palName').value=p.name; $('palTags').value=(p.tags||[]).join(', ');
  $('palNotes').value=p.notes||''; tmpColors=[...p.colors]; refreshChips(); openModal(true);
}
function openModal(keep) {
  if(!keep){ editId=null; $('modalTitle').textContent='New Palette'; $('palName').value=''; $('palTags').value=''; $('palNotes').value=''; tmpColors=[]; refreshChips(); }
  $('overlay').classList.add('open'); setTimeout(()=>$('palName').focus(),150);
}
function closeModal() { $('overlay').classList.remove('open'); }
function closeIfBg(e) { if(e.target===$('overlay'))closeModal(); }
function addColor() {
  let h=$('hexInput').value.trim(); if(!h)h=$('picker').value;
  if(!h.startsWith('#'))h='#'+h;
  if(!/^#[0-9a-fA-F]{6}$/.test(h)){toast('Invalid hex — e.g. #ff5500');return;}
  if(tmpColors.length>=10){toast('Max 10 colors');return;}
  tmpColors.push(h.toLowerCase()); $('hexInput').value=''; refreshChips();
}
$('picker').addEventListener('input',()=>{ $('hexInput').value=$('picker').value; });
$('hexInput').addEventListener('input',()=>{ let v=$('hexInput').value.trim(); if(!v.startsWith('#'))v='#'+v; if(/^#[0-9a-fA-F]{6}$/.test(v))$('picker').value=v; });
$('hexInput').addEventListener('keydown',e=>{ if(e.key==='Enter')addColor(); });
function refreshChips() {
  $('colorChips').innerHTML=tmpColors.map((c,i)=>`<div class="chip"><span class="chip-dot" style="background:${c}"></span><span>${c}</span><button class="chip-rm" onclick="rmColor(${i})">×</button></div>`).join('');
  const prev=$('preview');
  if(tmpColors.length){prev.style.display='flex';prev.innerHTML=tmpColors.map(c=>`<span style="background:${c}"></span>`).join('');}
  else prev.style.display='none';
}
function rmColor(i){ tmpColors.splice(i,1); refreshChips(); }
function savePal() {
  const name=$('palName').value.trim(); if(!name){toast('Add a name');return;}
  if(!tmpColors.length){toast('Add at least one color');return;}
  const tags=$('palTags').value.split(',').map(t=>t.trim()).filter(Boolean);
  const notes=$('palNotes').value.trim();
  if(editId!==null){
    const i=pals.findIndex(p=>p.id===editId);
    if(i>=0)pals[i]={...pals[i],name,colors:[...tmpColors],tags,notes};
    toast('Palette updated');
  } else {
    pals.unshift({id:Date.now(),name,colors:[...tmpColors],tags,notes,active:true,created:Date.now()});
    toast('Palette saved');
  }
  persist(); closeModal(); render();
}
function toast(msg){ const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400); }

$('search').addEventListener('input',render);
$('sort').addEventListener('change',render);
document.addEventListener('click',e=>{
  const tog=e.target.closest('input[data-toggle]');
  if(tog){const id=Number(tog.dataset.toggle);const p=pals.find(x=>x.id===id);if(p){p.active=tog.checked;persist();render();}return;}
  const swatch=e.target.closest('.swatch[data-hex]');
  if(swatch){copySwatch(swatch.dataset.hex,swatch);return;}
  const chip=e.target.closest('.hex-chip[data-hex]');
  if(chip){copyText(chip.dataset.hex);return;}
  const ca=e.target.closest('[data-copyall]');
  if(ca){const p=pals.find(x=>x.id==ca.dataset.copyall);if(p)copyText(p.colors.join(', '));return;}
  
  
});
loadPalettes();
</script>
</body>
</html>
