<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hoks — palettes</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #fff; --surface: #f7f7f7; --ink: #111;
  --ink3: #bbb; --border: #e8e8e8; --border-dark: #d0d0d0;
  --f: 'Courier New', Courier, monospace; --r: 2px;
}
body { font-family: var(--f); background: var(--bg); color: var(--ink); min-height: 100vh; padding-bottom: 6rem; }
.controls {
  max-width: 1100px; margin: 52px auto 0;
  padding: 1.2rem 2rem;
  display: flex; gap: 10px; align-items: center;
  border-bottom: 1px solid var(--border);
  justify-content: space-between;
}
.controls-left { display: flex; gap: 10px; align-items: center; flex: 1; }
.controls-right { flex-shrink: 0; }
.search-wrap { flex: 1; min-width: 160px; }
.search-wrap input {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 8px 12px; font-family: var(--f);
  font-size: 11px; color: var(--ink); outline: none; letter-spacing: 0.04em;
  transition: border-color 0.15s;
}
.search-wrap input:focus { border-color: var(--border-dark); }
.search-wrap input::placeholder { color: var(--ink3); text-transform: uppercase; letter-spacing: 0.08em; }
.sort-select { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 8px 10px; font-family: var(--f); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink); cursor: pointer; outline: none; }
.count { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink3); white-space: nowrap; }
.grid { max-width: 1100px; margin: 2rem auto 0; padding: 0 2rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
.palette-card { background: var(--bg); border: 1px solid var(--border); border-radius: 3px; overflow: hidden; display: flex; flex-direction: column; transition: border-color 0.15s; }
.palette-card:hover { border-color: var(--border-dark); }
.palette-card.inactive { filter: grayscale(1); opacity: 0.45; }
.swatches { display: flex; height: 72px; overflow: hidden; }
.swatch { flex: 1; cursor: pointer; position: relative; transition: flex 0.25s cubic-bezier(0.4,0,0.2,1); }
.swatch:hover { flex: 2.5; }
.swatch-tip { position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.65); color: #fff; font-family: var(--f); font-size: 8px; font-weight: 700; padding: 2px 6px; border-radius: 2px; white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity 0.12s; letter-spacing: 0.04em; }
.swatch:hover .swatch-tip { opacity: 1; }
.card-body { padding: 10px 12px 6px; flex: 1; }
.card-name-row { display: flex; align-items: center; justify-content: space-between; gap: 6px; margin-bottom: 4px; }
.card-name { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink); }
.inactive-tag { font-size: 8px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink3); border: 1px solid var(--border); border-radius: 2px; padding: 1px 5px; flex-shrink: 0; }
.card-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 3px; }
.card-date { font-size: 9px; color: var(--ink3); letter-spacing: 0.04em; }
.prob-badge { font-size: 8px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 1px 6px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
.prob-common    { background: #f1efe8; color: #5f5e5a; }
.prob-uncommon  { background: #e1f5ee; color: #085041; }
.prob-rare      { background: #e6f1fb; color: #0c447c; }
.prob-superrare { background: #eeedfe; color: #3c3489; }
.prob-legendary { background: #faeeda; color: #633806; }
.card-tags { display: flex; gap: 3px; flex-wrap: wrap; }
.tag { font-size: 8px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink3); border: 1px solid var(--border); border-radius: 2px; padding: 1px 5px; }
.card-footer { display: flex; align-items: center; justify-content: space-between; padding: 6px 12px 10px; gap: 6px; margin-top: auto; }
.hex-list { display: flex; gap: 4px; flex-wrap: wrap; flex: 1; }
.hex-chip { font-size: 8px; font-weight: 600; letter-spacing: 0.03em; color: var(--ink3); cursor: pointer; font-family: var(--f); transition: color 0.12s; }
.hex-chip:hover { color: var(--ink); }
.card-actions { display: flex; gap: 2px; flex-shrink: 0; }
.btn-icon { background: none; border: none; cursor: pointer; color: var(--ink3); font-size: 11px; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: 2px; transition: color 0.12s, background 0.12s; }
.btn-icon:hover { color: var(--ink); background: var(--surface); }
.empty-state { grid-column: 1/-1; padding: 5rem 2rem; text-align: center; }
.empty-big { font-size: 1.2rem; font-weight: 300; color: var(--ink3); margin-bottom: 6px; }
.empty-sub { font-size: 11px; color: var(--ink3); letter-spacing: 0.06em; text-transform: uppercase; }
.toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(6px); background: var(--ink); color: #fff; font-family: var(--f); font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 9px 18px; border-radius: 2px; opacity: 0; pointer-events: none; transition: all 0.2s; z-index: 300; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<script src="nav.js"></script>
<div class="controls">
  <div class="controls-left">
    <div class="search-wrap"><input type="text" id="search" placeholder="Search by name or tag…"></div>
    <select class="sort-select" id="sort">
      <option value="prob">By Rarity</option>
      <option value="newest">Newest</option>
      <option value="oldest">Oldest</option>
      <option value="name">Name</option>
      <option value="colors">Colors</option>
    </select>
    <span class="count" id="count"></span>
  </div>
  <div class="controls-right"></div>
</div>
<div class="grid" id="grid"></div>
<div class="toast" id="toast"></div>
<script>
const RAW = 'https://raw.githubusercontent.com/Joxemari/hoks/main/data/';

function ageWeight(createdMs) {
  if (!createdMs || createdMs < 1000) return 1.0;
  const ageDays = (Date.now() - createdMs) / 86400000;
  if (ageDays < 30)  return 4.0;
  if (ageDays < 90)  return 2.0;
  if (ageDays < 180) return 1.0;
  if (ageDays < 365) return 0.4;
  return 0.15;
}
function probRarity(prob) {
  if (prob > 0.08)  return { label:'Common',    cls:'common' };
  if (prob > 0.03)  return { label:'Uncommon',  cls:'uncommon' };
  if (prob > 0.01)  return { label:'Rare',       cls:'rare' };
  if (prob > 0.003) return { label:'Super Rare', cls:'superrare' };
  return                   { label:'Legendary',  cls:'legendary' };
}
function formatDate(ms) {
  if (!ms || ms < 1000) return null;
  return new Date(ms).toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'});
}

let pals = [];

fetch(RAW + 'palettes.json?t=' + Date.now())
  .then(r => r.ok ? r.json() : [])
  .then(data => {
    // Compute probs on ALL palettes (active + inactive) for display
    const weights = data.map(p => ageWeight(p.created));
    const totalActive = data
      .filter(p => p.active !== false)
      .map(p => ageWeight(p.created))
      .reduce((a,b) => a+b, 0);
    pals = data.map((p,i) => ({
      ...p,
      prob: p.active !== false ? weights[i] / totalActive : 0
    }));
    render();
  })
  .catch(() => { document.getElementById('grid').innerHTML='<div class="empty-state"><p class="empty-big">Could not load palettes</p></div>'; });

function render() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const srt = document.getElementById('sort').value;
  let list = pals.filter(p => !q || p.name.toLowerCase().includes(q) || (p.tags||[]).some(t=>t.toLowerCase().includes(q)));
  if(srt==='prob')    list.sort((a,b) => a.prob - b.prob); // rarest first
  if(srt==='newest')  list.sort((a,b) => (b.created||0)-(a.created||0));
  if(srt==='oldest')  list.sort((a,b) => (a.created||0)-(b.created||0));
  if(srt==='name')    list.sort((a,b) => a.name.localeCompare(b.name));
  if(srt==='colors')  list.sort((a,b) => b.colors.length-a.colors.length);
  const active = list.filter(p => p.active !== false).length;
  document.getElementById('count').textContent = `${list.length} palettes · ${active} active`;
  const grid = document.getElementById('grid');
  if (!list.length) { grid.innerHTML='<div class="empty-state"><p class="empty-big">No results</p><p class="empty-sub">Try a different term</p></div>'; return; }
  const isActive = p => p.active !== false;
  grid.innerHTML = list.map(p => {
    const active = isActive(p);
    const rarity = active ? probRarity(p.prob) : null;
    const dateStr = formatDate(p.created);
    const probPct = active ? (p.prob * 100).toFixed(1) + '%' : null;
    return `
    <div class="palette-card${active?'':' inactive'}">
      <div class="swatches">
        ${p.colors.map(c=>`<div class="swatch" style="background:${esc(c)}" data-hex="${esc(c)}"><span class="swatch-tip">${esc(c)}</span></div>`).join('')}
      </div>
      <div class="card-body">
        <div class="card-name-row">
          <div class="card-name">${esc(p.name)}</div>
          ${active && rarity ? `<span class="prob-badge prob-${rarity.cls}">${rarity.label}</span>` : `<span class="inactive-tag">Inactive</span>`}
        </div>
        <div class="card-meta">
          ${dateStr ? `<span class="card-date">${dateStr}</span>` : ''}
          ${active && probPct ? `<span class="card-date" style="color:#888;">↑ ${probPct} chance</span>` : ''}
        </div>
        ${p.tags?.length ? `<div class="card-tags">${p.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>` : ''}
      </div>
      <div class="card-footer">
        <div class="hex-list">${p.colors.map(c=>`<span class="hex-chip" data-hex="${esc(c)}">${esc(c)}</span>`).join('')}</div>
        <div class="card-actions">
          <button class="btn-icon" title="Copy all" data-copyall="${p.id}">⎘</button>
        </div>
      </div>
    </div>`}).join('');
}

const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
async function copyText(t) {
  try { await navigator.clipboard.writeText(t); toast('Copied: '+t); }
  catch(e) { toast('Copy failed'); }
}
function copySwatch(hex,el) { copyText(hex); const tip=el.querySelector('.swatch-tip'); if(tip){tip.textContent='✓';setTimeout(()=>{tip.textContent=hex;},1200);} }

document.getElementById('search').addEventListener('input',render);
document.getElementById('sort').addEventListener('change',render);
document.addEventListener('click',e=>{
  const swatch=e.target.closest('.swatch[data-hex]'); if(swatch){copySwatch(swatch.dataset.hex,swatch);return;}
  const chip=e.target.closest('.hex-chip[data-hex]'); if(chip){copyText(chip.dataset.hex);return;}
  const ca=e.target.closest('[data-copyall]'); if(ca){const p=pals.find(x=>x.id==ca.dataset.copyall);if(p)copyText(p.colors.join(', '));return;}
});

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}
</script>
</body>
</html>
