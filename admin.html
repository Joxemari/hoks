<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hoks — admin</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --f: 'Courier New', Courier, monospace;
  --ink: #111; --ink2: #888; --ink3: #bbb;
  --bg: #fff; --surface: #f7f7f7;
  --border: #e8e8e8; --border-dark: #ccc;
  --r: 2px; --red: #c0392b;
}
body { font-family: var(--f); background: var(--bg); color: var(--ink); min-height: 100vh; }
#login-screen {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh; gap: 1.5rem; padding: 2rem;
}
#login-screen h1 { font-size: 11px; font-weight: 400; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink3); }
.login-form { display: flex; flex-direction: column; gap: 10px; width: 260px; }
.login-form input {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 10px 14px; font-family: var(--f);
  font-size: 12px; color: var(--ink); outline: none; text-align: center;
  letter-spacing: 0.08em; transition: border-color 0.15s;
}
.login-form input:focus { border-color: var(--border-dark); }
.login-form button {
  font-family: var(--f); font-size: 10px; font-weight: 700; letter-spacing: 0.14em;
  text-transform: uppercase; background: var(--ink); color: #fff; border: none;
  border-radius: var(--r); padding: 10px; cursor: pointer; transition: opacity 0.15s;
}
.login-form button:hover { opacity: 0.75; }
.login-error { font-size: 10px; color: var(--red); letter-spacing: 0.06em; text-align: center; display: none; }
#admin-screen { display: none; }
header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 2rem; height: 52px; background: #fff; border-bottom: 1px solid var(--border);
}
.header-logo { display: flex; align-items: center; gap: 10px; }
.header-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--ink); }
.header-name { font-size: 11px; letter-spacing: 0.08em; }
.header-badge { font-size: 9px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--red); border: 1px solid var(--red); border-radius: 2px; padding: 2px 7px; }
.header-right { display: flex; align-items: center; gap: 1.5rem; }
.header-nav a { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; text-decoration: none; color: var(--ink3); transition: color 0.15s; }
.header-nav a:hover { color: var(--ink); }
.btn-logout { font-family: var(--f); font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; background: none; color: var(--ink3); border: 1px solid var(--border); border-radius: var(--r); padding: 7px 14px; cursor: pointer; transition: color 0.15s, border-color 0.15s; }
.btn-logout:hover { color: var(--ink); border-color: var(--border-dark); }
.admin-layout { max-width: 1000px; margin: 0 auto; padding: 80px 2rem 6rem; }
.tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 2.5rem; }
.tab-btn { font-family: var(--f); font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; background: none; border: none; border-bottom: 2px solid transparent; padding: 12px 20px; cursor: pointer; color: var(--ink3); transition: color 0.15s; margin-bottom: -1px; }
.tab-btn:hover { color: var(--ink); }
.tab-btn.active { color: var(--ink); border-bottom-color: var(--ink); }
.tab-panel { display: none; }
.tab-panel.active { display: block; }
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
.section-title { font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink3); }
.btn { font-family: var(--f); font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; background: var(--ink); color: #fff; border: none; border-radius: var(--r); padding: 8px 16px; cursor: pointer; transition: opacity 0.15s; white-space: nowrap; }
.btn:hover { opacity: 0.75; }
.btn-outline { background: none; color: var(--ink); border: 1px solid var(--border-dark); }
.btn-outline:hover { opacity: 1; border-color: var(--ink); }
.btn-danger { background: none; color: var(--red); border: 1px solid var(--red); }
.btn-danger:hover { background: var(--red); color: #fff; opacity: 1; }
.palette-list { display: flex; flex-direction: column; gap: 8px; }
.palette-row { display: flex; align-items: center; gap: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 10px 14px; transition: border-color 0.15s; }
.palette-row:hover { border-color: var(--border-dark); }
.pal-swatches { display: flex; gap: 3px; flex-shrink: 0; }
.pal-swatch { width: 18px; height: 18px; border-radius: 2px; border: 1px solid rgba(0,0,0,0.08); }
.pal-name { flex: 1; font-size: 11px; font-weight: 700; letter-spacing: 0.04em; }
.pal-tags { font-size: 9px; color: var(--ink3); letter-spacing: 0.04em; }
.toggle { position: relative; width: 28px; height: 15px; display: inline-block; }
.toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
.toggle-track { position: absolute; inset: 0; background: var(--border); border-radius: 8px; cursor: pointer; transition: background 0.2s; }
.toggle input:checked + .toggle-track { background: var(--ink); }
.toggle-thumb { position: absolute; top: 2px; left: 2px; width: 11px; height: 11px; background: #fff; border-radius: 50%; transition: transform 0.2s; pointer-events: none; z-index: 1; }
.toggle input:checked + .toggle-track + .toggle-thumb { transform: translateX(13px); }
.pal-actions { display: flex; gap: 4px; flex-shrink: 0; }
.icon-btn { font-family: var(--f); font-size: 11px; background: none; border: 1px solid var(--border); border-radius: var(--r); width: 28px; height: 28px; cursor: pointer; color: var(--ink3); display: flex; align-items: center; justify-content: center; transition: color 0.12s, border-color 0.12s; }
.icon-btn:hover { color: var(--ink); border-color: var(--border-dark); }
.icon-btn.del:hover { color: var(--red); border-color: var(--red); }
.gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
.gallery-item { border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
.gallery-item img { width: 100%; display: block; }
.gallery-item-footer { display: flex; align-items: center; justify-content: space-between; padding: 4px 8px 6px; font-size: 9px; color: var(--ink3); }
.gallery-del { background: none; border: none; cursor: pointer; color: var(--ink3); font-size: 12px; transition: color 0.12s; }
.gallery-del:hover { color: var(--red); }
.settings-form { display: flex; flex-direction: column; gap: 1.2rem; max-width: 600px; }
.field label { display: block; font-size: 9px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink3); margin-bottom: 6px; }
.field input, .field textarea { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 9px 12px; font-family: var(--f); font-size: 12px; color: var(--ink); outline: none; transition: border-color 0.15s; }
.field input:focus, .field textarea:focus { border-color: var(--border-dark); background: #fff; }
.field textarea { resize: vertical; line-height: 1.7; }
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 1rem; opacity: 0; pointer-events: none; transition: opacity 0.18s; }
.overlay.open { opacity: 1; pointer-events: all; }
.modal { background: var(--bg); border: 1px solid var(--border-dark); border-radius: 3px; padding: 1.8rem; width: 100%; max-width: 420px; max-height: 90vh; overflow-y: auto; transform: translateY(8px); opacity: 0; transition: transform 0.2s, opacity 0.18s; }
.overlay.open .modal { transform: translateY(0); opacity: 1; }
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.4rem; }
.modal h2 { font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; }
.modal-close { background: none; border: none; cursor: pointer; color: var(--ink3); font-size: 18px; }
.modal-close:hover { color: var(--ink); }
.color-chips { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; min-height: 4px; }
.chip { display: flex; align-items: center; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: 2px; padding: 3px 8px 3px 6px; font-size: 10px; }
.chip-dot { width: 10px; height: 10px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.1); flex-shrink: 0; }
.chip-rm { border: none; background: none; cursor: pointer; color: var(--ink3); font-size: 13px; padding: 0; transition: color 0.12s; }
.chip-rm:hover { color: var(--red); }
.add-row { display: flex; gap: 6px; align-items: center; }
.add-row input[type="color"] { width: 34px; height: 34px; border: 1px solid var(--border); border-radius: var(--r); padding: 2px; background: var(--surface); cursor: pointer; flex-shrink: 0; }
.add-row input[type="text"] { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 8px 10px; font-family: var(--f); font-size: 11px; color: var(--ink); outline: none; }
.add-row input[type="text"]:focus { border-color: var(--border-dark); }
.btn-add-color { font-family: var(--f); font-weight: 700; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; background: var(--surface); border: 1px solid var(--border-dark); border-radius: var(--r); padding: 8px 12px; cursor: pointer; color: var(--ink); white-space: nowrap; }
.btn-add-color:hover { border-color: var(--ink); }
.preview-strip { height: 10px; border-radius: 2px; border: 1px solid var(--border); overflow: hidden; display: flex; margin-top: 8px; }
.preview-strip span { flex: 1; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.4rem; padding-top: 1rem; border-top: 1px solid var(--border); }
.pwd-form { max-width: 300px; display: flex; flex-direction: column; gap: 10px; }
.saving-indicator { font-size: 9px; color: var(--ink3); letter-spacing: 0.1em; text-transform: uppercase; display: none; }
.saving-indicator.show { display: inline; }
.toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(6px); background: var(--ink); color: #fff; font-family: var(--f); font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 9px 18px; border-radius: 2px; opacity: 0; pointer-events: none; transition: all 0.2s; z-index: 300; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.empty-state { padding: 3rem 0; text-align: center; font-size: 11px; color: var(--ink3); letter-spacing: 0.06em; }
</style>
</head>
<body>

<div id="login-screen">
  <h1>hoks · admin</h1>
  <div class="login-form">
    <input type="password" id="pwd-input" placeholder="password" autocomplete="current-password">
    <button onclick="tryLogin()">Enter</button>
    <span class="login-error" id="login-error">incorrect password</span>
  </div>
</div>

<div id="admin-screen">
  <header>
    <div class="header-logo">
      <span class="header-dot"></span>
      <span class="header-name">hoks</span>
      <span class="header-badge">admin</span>
    </div>
    <div class="header-right">
      <nav class="header-nav">
        <a href="index.html" target="_blank">↗ site</a>
      </nav>
      <span class="saving-indicator" id="saving">saving…</span>
      <button class="btn-logout" onclick="logout()">Log out</button>
    </div>
  </header>

  <div class="admin-layout">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('palettes')">Palettes</button>
      <button class="tab-btn" onclick="switchTab('gallery')">Gallery</button>
      <button class="tab-btn" onclick="switchTab('site')">Site</button>
      <button class="tab-btn" onclick="switchTab('security')">Security</button>
    </div>

    <div class="tab-panel active" id="tab-palettes">
      <div class="section-header">
        <span class="section-title">Palettes (<span id="pal-count">0</span>)</span>
        <button class="btn" onclick="openPalModal()">+ New Palette</button>
      </div>
      <div class="palette-list" id="palette-list"></div>
    </div>

    <div class="tab-panel" id="tab-gallery">
      <div class="section-header">
        <span class="section-title">Saved Iterations (<span id="gal-count">0</span>)</span>
        <button class="btn btn-danger" onclick="clearAllGallery()">Clear All</button>
      </div>
      <div class="gallery-grid" id="gallery-grid"></div>
    </div>

    <div class="tab-panel" id="tab-site">
      <div class="section-title" style="margin-bottom:1.5rem">Site Content</div>
      <div class="settings-form">
        <div class="field">
          <label>About Text</label>
          <textarea id="about-text-input" rows="5"></textarea>
        </div>
        <div class="field">
          <label>Contact Email</label>
          <input type="email" id="email-input">
        </div>
        <div class="field">
          <label>Instagram URL</label>
          <input type="url" id="instagram-input">
        </div>
        <button class="btn" onclick="saveSiteContent()" style="width:fit-content">Save & Publish</button>
      </div>
    </div>

    <div class="tab-panel" id="tab-security">
      <div class="section-title" style="margin-bottom:1.5rem">Change Password</div>
      <div class="pwd-form">
        <div class="field"><label>Current Password</label><input type="password" id="pwd-current"></div>
        <div class="field"><label>New Password</label><input type="password" id="pwd-new"></div>
        <div class="field"><label>Confirm</label><input type="password" id="pwd-confirm"></div>
        <button class="btn" onclick="changePassword()" style="width:fit-content">Update Password</button>
      </div>
      <div style="margin-top:2rem;padding-top:2rem;border-top:1px solid var(--border)">
        <div class="section-title" style="margin-bottom:1rem">GitHub Token</div>
        <div class="pwd-form">
          <div class="field"><label>Personal Access Token</label><input type="password" id="gh-token-input" placeholder="ghp_…"></div>
          <button class="btn btn-outline" onclick="saveToken()" style="width:fit-content">Update Token</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeIfBg(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">New Palette</h2>
      <button class="modal-close" onclick="closePalModal()">×</button>
    </div>
    <div class="field"><label>Name</label><input type="text" id="pal-name" placeholder="Palette name…"></div>
    <div class="field"><label>Tags (comma separated)</label><input type="text" id="pal-tags"></div>
    <div class="field">
      <label>Colors</label>
      <div class="color-chips" id="color-chips"></div>
      <div class="add-row">
        <input type="color" id="color-picker" value="#226699">
        <input type="text" id="hex-input" placeholder="#226699" maxlength="7">
        <button class="btn-add-color" onclick="addColor()">Add</button>
      </div>
      <div class="preview-strip" id="preview" style="display:none"></div>
    </div>
    <div class="field"><label>Notes</label><input type="text" id="pal-notes"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closePalModal()">Cancel</button>
      <button class="btn" onclick="savePalette()">Save & Publish</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const PWD_KEY     = 'hoks-admin-pwd';
const SESSION_KEY = 'hoks-admin-session';
const TOKEN_KEY   = 'hoks-gh-token';
const DEFAULT_PWD = 'hoks2026';
const REPO        = 'Joxemari/hoks';
const DATA_BASE   = `https://api.github.com/repos/${REPO}/contents/data/`;
const RAW_BASE    = `https://raw.githubusercontent.com/${REPO}/main/data/`;

const $ = id => document.getElementById(id);

// ── GITHUB API ───────────────────────────────────────
function getToken() { return localStorage.getItem(TOKEN_KEY) || ''; }

async function ghFetch(path, content, msg) {
  const token = getToken();
  showSaving(true);
  let sha;
  try {
    const r = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (r.ok) { sha = (await r.json()).sha; }
  } catch(e) {}

  const body = { message: msg, content: btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2)))) };
  if (sha) body.sha = sha;
  const r = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
    method: 'PUT',
    headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  showSaving(false);
  if (!r.ok) { const d = await r.json(); toast('GitHub error: ' + (d.message||r.status)); return false; }
  return true;
}

async function ghRead(path) {
  const r = await fetch(RAW_BASE + path + '?t=' + Date.now());
  if (!r.ok) return null;
  return r.json();
}

function showSaving(v) { $('saving').classList.toggle('show', v); }

// ── AUTH ─────────────────────────────────────────────
function getStoredPwd() { return localStorage.getItem(PWD_KEY) || DEFAULT_PWD; }
function tryLogin() {
  if ($('pwd-input').value === getStoredPwd()) {
    sessionStorage.setItem(SESSION_KEY, '1');
    showAdmin();
  } else {
    $('login-error').style.display = 'block';
    $('pwd-input').value = ''; $('pwd-input').focus();
  }
}
function logout() { sessionStorage.removeItem(SESSION_KEY); location.reload(); }
function showAdmin() {
  $('login-screen').style.display = 'none';
  $('admin-screen').style.display = 'block';
  loadAll();
}
if (sessionStorage.getItem(SESSION_KEY) === '1') showAdmin();
$('pwd-input').addEventListener('keydown', e => { if (e.key==='Enter') tryLogin(); });

// ── TABS ─────────────────────────────────────────────
const TAB_NAMES = ['palettes','gallery','site','security'];
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', TAB_NAMES[i]===name));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  $('tab-'+name).classList.add('active');
}

// ── LOAD ─────────────────────────────────────────────
let pals = [], gallery = [], site = {};
async function loadAll() {
  [pals, gallery, site] = await Promise.all([
    ghRead('palettes.json').then(d => d||[]),
    ghRead('gallery.json').then(d => d||[]),
    ghRead('site.json').then(d => d||{}),
  ]);
  renderPalettes(); renderGallery(); loadSiteForm();
}

// ── PALETTES ─────────────────────────────────────────
function renderPalettes() {
  $('pal-count').textContent = pals.length;
  const list = $('palette-list');
  if (!pals.length) { list.innerHTML='<div class="empty-state">No palettes yet</div>'; return; }
  list.innerHTML = pals.map((p,i) => `
    <div class="palette-row">
      <div class="pal-swatches">${p.colors.slice(0,8).map(c=>`<span class="pal-swatch" style="background:${esc(c)}"></span>`).join('')}</div>
      <div style="flex:1;min-width:0">
        <div class="pal-name">${esc(p.name)}</div>
        ${p.tags?.length?`<div class="pal-tags">${p.tags.map(t=>esc(t)).join(', ')}</div>`:''}
      </div>
      <label class="toggle">
        <input type="checkbox" ${p.active!==false?'checked':''} onchange="togglePal(${i},this.checked)">
        <div class="toggle-track"></div><div class="toggle-thumb"></div>
      </label>
      <div class="pal-actions">
        <button class="icon-btn" title="Edit" onclick="editPal(${i})">✎</button>
        <button class="icon-btn del" title="Delete" onclick="deletePal(${i})">✕</button>
      </div>
    </div>`).join('');
}

async function togglePal(i, val) {
  pals[i].active = val;
  await ghFetch('data/palettes.json', pals, `toggle palette: ${pals[i].name}`);
  toast(val ? 'Palette activated' : 'Palette deactivated');
}

async function deletePal(i) {
  if (!confirm('Delete this palette?')) return;
  const name = pals[i].name;
  pals.splice(i,1);
  await ghFetch('data/palettes.json', pals, `delete palette: ${name}`);
  renderPalettes(); toast('Palette deleted');
}

// ── PALETTE MODAL ─────────────────────────────────────
let editIdx = null, tmpColors = [];
function openPalModal(idx) {
  editIdx = idx !== undefined ? idx : null;
  const p = editIdx !== null ? pals[editIdx] : null;
  $('modal-title').textContent = p ? 'Edit Palette' : 'New Palette';
  $('pal-name').value = p?.name || '';
  $('pal-tags').value = (p?.tags||[]).join(', ');
  $('pal-notes').value = p?.notes || '';
  tmpColors = p ? [...p.colors] : [];
  refreshChips();
  $('overlay').classList.add('open');
  setTimeout(()=>$('pal-name').focus(),100);
}
function closePalModal() { $('overlay').classList.remove('open'); }
function closeIfBg(e) { if (e.target===$('overlay')) closePalModal(); }
function addColor() {
  let h = $('hex-input').value.trim() || $('color-picker').value;
  if (!h.startsWith('#')) h='#'+h;
  if (!/^#[0-9a-fA-F]{6}$/.test(h)) { toast('Invalid hex'); return; }
  if (tmpColors.length>=12) { toast('Max 12 colors'); return; }
  tmpColors.push(h.toLowerCase()); $('hex-input').value=''; refreshChips();
}
$('color-picker').addEventListener('input',()=>$('hex-input').value=$('color-picker').value);
$('hex-input').addEventListener('input',()=>{ let v=$('hex-input').value.trim(); if(!v.startsWith('#'))v='#'+v; if(/^#[0-9a-fA-F]{6}$/.test(v))$('color-picker').value=v; });
$('hex-input').addEventListener('keydown',e=>{ if(e.key==='Enter')addColor(); });
function refreshChips() {
  $('color-chips').innerHTML = tmpColors.map((c,i)=>`<div class="chip"><span class="chip-dot" style="background:${c}"></span><span>${c}</span><button class="chip-rm" onclick="rmColor(${i})">×</button></div>`).join('');
  const prev=$('preview');
  if(tmpColors.length){prev.style.display='flex';prev.innerHTML=tmpColors.map(c=>`<span style="background:${c}"></span>`).join('');}
  else prev.style.display='none';
}
function rmColor(i){tmpColors.splice(i,1);refreshChips();}
function editPal(i){openPalModal(i);}
async function savePalette() {
  const name=$('pal-name').value.trim();
  if(!name){toast('Add a name');return;}
  if(!tmpColors.length){toast('Add at least one color');return;}
  const tags=$('pal-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
  const notes=$('pal-notes').value.trim();
  if(editIdx!==null){
    pals[editIdx]={...pals[editIdx],name,colors:[...tmpColors],tags,notes};
    toast('Palette updated');
  }else{
    pals.unshift({id:Date.now(),name,colors:[...tmpColors],tags,notes,active:true,created:Date.now()});
    toast('Palette saved');
  }
  await ghFetch('data/palettes.json',pals,`${editIdx!==null?'update':'add'} palette: ${name}`);
  closePalModal(); renderPalettes();
}

// ── GALLERY ───────────────────────────────────────────
function renderGallery() {
  $('gal-count').textContent = gallery.length;
  const grid=$('gallery-grid');
  if(!gallery.length){grid.innerHTML='<div class="empty-state" style="grid-column:1/-1">No saved iterations</div>';return;}
  grid.innerHTML=gallery.map((item,i)=>`
    <div class="gallery-item">
      <img src="${item.dataUrl}" alt="seed ${item.seed}" loading="lazy">
      <div class="gallery-item-footer">
        <span>#${item.seed}</span>
        <button class="gallery-del" onclick="deleteGalleryItem(${i})">✕</button>
      </div>
    </div>`).join('');
}
async function deleteGalleryItem(i) {
  if(!confirm('Delete this iteration?'))return;
  gallery.splice(i,1);
  await ghFetch('data/gallery.json',gallery,'delete gallery item');
  renderGallery(); toast('Iteration deleted');
}
async function clearAllGallery() {
  if(!confirm('Clear all saved iterations?'))return;
  gallery=[];
  await ghFetch('data/gallery.json',[],'clear gallery');
  renderGallery(); toast('Gallery cleared');
}

// ── SITE ─────────────────────────────────────────────
function loadSiteForm() {
  $('about-text-input').value = site.aboutText||'';
  $('email-input').value = site.footerEmail||'';
  $('instagram-input').value = site.footerInstagram||'';
}
async function saveSiteContent() {
  const data={aboutText:$('about-text-input').value.trim(),footerEmail:$('email-input').value.trim(),footerInstagram:$('instagram-input').value.trim()};
  const ok=await ghFetch('data/site.json',data,'update site content');
  if(ok) toast('Site content published');
}

// ── SECURITY ──────────────────────────────────────────
function changePassword() {
  const current=$('pwd-current').value,newP=$('pwd-new').value,conf=$('pwd-confirm').value;
  if(current!==getStoredPwd()){toast('Current password incorrect');return;}
  if(!newP){toast('New password cannot be empty');return;}
  if(newP!==conf){toast('Passwords do not match');return;}
  localStorage.setItem(PWD_KEY,newP);
  $('pwd-current').value='';$('pwd-new').value='';$('pwd-confirm').value='';
  toast('Password updated');
}
function saveToken() {
  const t=$('gh-token-input').value.trim();
  if(!t){toast('Token cannot be empty');return;}
  localStorage.setItem(TOKEN_KEY,t);
  $('gh-token-input').value='';
  toast('Token saved');
}

// ── UTILS ─────────────────────────────────────────────
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}
</script>
